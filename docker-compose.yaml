version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=chiliz_chain_pulse
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  signer:
    build:
      context: ./signer
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code for live reloading
      - ./signer:/app
      # Cache Go modules (speeds up rebuilds)
      - go_modules:/go/pkg/mod
      # Persist VS Code extensions
      - vscode_extensions_signer:/root/.vscode-server/extensions
    environment:
      - GO_ENV=development
      - CHAIN_ID=${CHAIN_ID}
      - ORACLE_CONTRACT_ADDRESS=${ORACLE_CONTRACT_ADDRESS}
      - PRIVATE_KEY_FILE=/app/private.key
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=chiliz_chain_pulse
      - DB_SSLMODE=disable
    depends_on:
      postgres:
        condition: service_healthy
    # Override command to use air for hot reloading
    command: air

  provider:
    build:
      context: ./provider
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code for live reloading
      - ./provider:/app
      # Cache Go modules (speeds up rebuilds)
      - go_modules:/go/pkg/mod
      # Persist VS Code extensions
      - vscode_extensions_provider:/root/.vscode-server/extensions
    environment:
      - GO_ENV=development
      - FOOTBALL_ORG_API_KEY=${FOOTBALL_ORG_API_KEY}
      - FOOTBALL_ORG_API_ENDPOINT=${FOOTBALL_ORG_API_ENDPOINT}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=chiliz_chain_pulse
      - DB_SSLMODE=disable
    depends_on:
      postgres:
        condition: service_healthy
    # Override command to use air for hot reloading
    command: air

  mock-api:
    build:
      context: ./mock-api
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code for live reloading
      - ./mock-api:/app
      # Cache Go modules (speeds up rebuilds)
      - go_modules:/go/pkg/mod
      # Persist VS Code extensions
      - vscode_extensions_mock_api:/root/.vscode-server/extensions
    environment:
      - GO_ENV=development
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=chiliz_chain_pulse
      - DB_SSLMODE=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # Override command to use air for hot reloading
    command: air

  oracle:
    build:
      context: ./oracle
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code
      - ./oracle:/app
      # Persist VS Code extensions
      - vscode_extensions_oracle:/root/.vscode-server/extensions
    working_dir: /app
    tty: true
    stdin_open: true
    command: tail -f /dev/null

volumes:
  go_modules:
  vscode_extensions_signer:
  vscode_extensions_provider:
  vscode_extensions_mock_api:
  vscode_extensions_oracle:
  postgres_data: