version: '3.8'

services:
  signer:
    build:
      context: ./signer
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code for live reloading
      - ./signer:/app
      # Cache Go modules (speeds up rebuilds)
      - go_modules:/go/pkg/mod
    environment:
      - GO_ENV=development
      - CHAIN_ID=${CHAIN_ID}
      - ORACLE_CONTRACT_ADDRESS=${ORACLE_CONTRACT_ADDRESS}
      - PRIVATE_KEY_FILE=/app/private.key
    # Override command to use air for hot reloading
    command: air

  provider:
    build:
      context: ./provider
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code for live reloading
      - ./provider:/app
      # Cache Go modules (speeds up rebuilds)
      - go_modules:/go/pkg/mod
    environment:
      - GO_ENV=development
      - FOOTBALL_ORG_API_KEY=${FOOTBALL_ORG_API_KEY}
      - FOOTBALL_ORG_API_ENDPOINT="https://api.football-data.org/v4"
    # Override command to use air for hot reloading
    command: air

volumes:
  go_modules: