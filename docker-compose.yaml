version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=sports_pulse
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  signer:
    build:
      context: ./signer
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code for live reloading
      - ./signer:/app
      # Cache Go modules (speeds up rebuilds)
      - go_modules:/go/pkg/mod
      # Persist VS Code extensions
      - vscode_extensions_signer:/root/.vscode-server/extensions
    environment:
      - GO_ENV=development
      - CHAIN_ID=${CHAIN_ID}
      - ORACLE_CONTRACT_ADDRESS=${ORACLE_CONTRACT_ADDRESS}
      - PRIVATE_KEY=${SIGNER_PRIVATE_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=sports_pulse
      - DB_SSLMODE=disable
    depends_on:
      postgres:
        condition: service_healthy
    # Override command to use air for hot reloading
    command: air

  provider:
    build:
      context: ./provider
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code for live reloading
      - ./provider:/app
      # Cache Go modules (speeds up rebuilds)
      - go_modules:/go/pkg/mod
      # Persist VS Code extensions
      - vscode_extensions_provider:/root/.vscode-server/extensions
    environment:
      - GO_ENV=development
      - FOOTBALL_ORG_API_KEY=${FOOTBALL_ORG_API_KEY}
      - FOOTBALL_ORG_API_ENDPOINT=${FOOTBALL_ORG_API_ENDPOINT}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=sports_pulse
      - DB_SSLMODE=disable
    depends_on:
      postgres:
        condition: service_healthy
    # Override command to use air for hot reloading
    command: air

  mock-api:
    build:
      context: ./mock-api
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code for live reloading
      - ./mock-api:/app
      # Cache Go modules (speeds up rebuilds)
      - go_modules:/go/pkg/mod
      # Persist VS Code extensions
      - vscode_extensions_mock_api:/root/.vscode-server/extensions
    environment:
      - GO_ENV=development
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=sports_pulse
      - DB_SSLMODE=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # Override command to use air for hot reloading
    command: air

  relayer:
    build:
      context: ./relayer
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code for live reloading
      - ./relayer:/app
      # Cache Rust dependencies (speeds up rebuilds)
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - cargo_target:/app/target
      # Persist VS Code extensions
      - vscode_extensions_relayer:/root/.vscode-server/extensions
    environment:
      - RUST_ENV=development
      - CHAIN_ID=${CHAIN_ID}
      - ORACLE_CONTRACT_ADDRESS=${ORACLE_CONTRACT_ADDRESS}
      - RPC_ENDPOINT=${RPC_ENDPOINT}
      - RELAYER_PRIVATE_KEY=${RELAYER_PRIVATE_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=sports_pulse
      - DB_SSLMODE=disable
    depends_on:
      postgres:
        condition: service_healthy
    # Override command for development (can use cargo watch for hot reloading)
    command: cargo watch -x run

  oracle:
    build:
      context: ./oracle
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code
      - ./oracle:/app
      # Persist VS Code extensions
      - vscode_extensions_oracle:/root/.vscode-server/extensions
    working_dir: /app
    tty: true
    stdin_open: true
    command: tail -f /dev/null

  slither:
    image: trailofbits/eth-security-toolbox:latest
    volumes:
      # Mount oracle folder to analyze contracts
      - ./oracle:/app/oracle
    working_dir: /app/oracle
    # Install and use solc 0.8.30, then run slither
    # Excludes lib/ folder (dependencies) from analysis
    # Can be overridden: docker compose run slither sh -c "solc-select install 0.8.30 && solc-select use 0.8.30 && slither src/ --json slither-report.json"
    command: sh -c "solc-select install 0.8.30 && solc-select use 0.8.30 && slither src --filter-paths 'lib/'"

volumes:
  go_modules:
  cargo_registry:
  cargo_git:
  cargo_target:
  vscode_extensions_signer:
  vscode_extensions_provider:
  vscode_extensions_mock_api:
  vscode_extensions_relayer:
  vscode_extensions_oracle:
  postgres_data: