version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=chiliz_chain_pulse
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  signer:
    build:
      context: ./signer
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code for live reloading
      - ./signer:/app
      # Cache Go modules (speeds up rebuilds)
      - go_modules:/go/pkg/mod
    environment:
      - GO_ENV=development
      - CHAIN_ID=${CHAIN_ID}
      - ORACLE_CONTRACT_ADDRESS=${ORACLE_CONTRACT_ADDRESS}
      - PRIVATE_KEY_FILE=/app/private.key
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=chiliz_chain_pulse
      - DB_SSLMODE=disable
    depends_on:
      postgres:
        condition: service_healthy
    # Override command to use air for hot reloading
    command: air

  provider:
    build:
      context: ./provider
      dockerfile: ./Dockerfile
    volumes:
      # Mount source code for live reloading
      - ./provider:/app
      # Cache Go modules (speeds up rebuilds)
      - go_modules:/go/pkg/mod
    environment:
      - GO_ENV=development
      - FOOTBALL_ORG_API_KEY=${FOOTBALL_ORG_API_KEY}
      - FOOTBALL_ORG_API_ENDPOINT=https://api.football-data.org/v4
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=chiliz_chain_pulse
      - DB_SSLMODE=disable
    depends_on:
      postgres:
        condition: service_healthy
    # Override command to use air for hot reloading
    command: air

volumes:
  go_modules:
  postgres_data: